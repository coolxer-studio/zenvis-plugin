  interval = 5
  
# 数据处理，转化成json
[transforms.parse_json]
  inputs = ["generator_demo_logs"]
  type = "remap"
  source = '''
    . = parse_json!(string!(.message))
    .id = uuid_v4()
    .update_time = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
	.insert_time = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
  '''

[transforms.data_route]
type = "route"
inputs = [ "parse_json" ]

  [transforms.data_route.route]
  operation_page_event = '.operation == "operation_page_event"'
  operation_performance_event = '.operation_type == "operation_performance_event"'
  operation_network_event = '.operation_type == "operation_network_event"'
  operation_location_event = '.operation_type == "operation_location_event"'
  operation_extend_event = '.operation_type == "operation_extend_event"'
  operation_crash_event = '.operation_type == "operation_crash_event"'
  operation_anr_event = '.operation_type == "operation_anr_event"'
  operation_click_event = '.operation_type == "operation_click_event"'
  operation_api_call_event = '.operation_type == "operation_api_call_event"'
  operation_start_event = '.operation_type == "operation_start_event"'


# 输出目标配置
[sinks.my_clickhouse_sink_operation_page_event]
  type = "clickhouse"
  inputs = ["data_route.operation_page_event"]
  endpoint = "http://clickhouse-service:8123"
  database = "zenvis"
  table = "operation_page_event"

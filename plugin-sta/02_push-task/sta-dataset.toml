[transforms.parse_json]
  inputs        = ["generator_demo_logs"]
  type          = "remap"
  drop_on_error = false
  source        = '''
      . = parse_json!(string!(.message))
      .uid = uuid_v4()
      if .logtype == "utm" {
        .nLevel = random_int(1, 4)
      }
      if .logtype == "waf" || .logtype == "ips" || .logtype == "pvs" {
        .level = random_int(1, 4)
      }
  '''

[sinks.kafka_output]
  type = "kafka"
  inputs = ["parse_json"]
  bootstrap_servers = "kafka-service:9092"
  topic = "sta-log"
  encoding.codec = "json"

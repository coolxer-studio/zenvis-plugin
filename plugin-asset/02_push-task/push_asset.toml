# 数据处理，转化成json
[transforms.parse_json]
  inputs = ["generator_demo_logs"]
  type = "remap"
  source = '''
    . = parse_json!(string!(.message))
    .id = uuid_v4()
    .update_time = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
	.insert_time = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
  '''

[transforms.data_route]
type = "route"
inputs = [ "parse_json" ]

  [transforms.data_route.route]
  asset_host = '.asset_type == "asset_host"'
  asset_pc = '.asset_type == "asset_pc"'
  asset_iot = '.asset_type == "asset_iot"'
  asset_mobile = '.asset_type == "asset_mobile"'
  asset_probe = '.asset_type == "asset_probe"'
  asset_app = '.asset_type == "asset_app"'
  asset_service = '.asset_type == "asset_service"'
  asset_api = '.asset_type == "asset_api"'
  asset_log = '.asset_type == "asset_log"'
  asset_file = '.asset_type == "asset_file"'


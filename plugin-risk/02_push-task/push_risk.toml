# 数据处理，转化成json
[transforms.parse_json]
  inputs = ["generator_demo_logs"]
  type = "remap"
  source = '''
    . = parse_json!(string!(.message))
    .id = uuid_v4()
    .update_time = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
	.insert_time = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
  '''

[transforms.data_route]
type = "route"
inputs = [ "parse_json" ]

  [transforms.data_route.route]
  risk_event = '.risk_type == "risk_event"'
  risk_data = '.risk_type == "risk_data"'
  risk_vulnerability = '.risk_type == "risk_vulnerability"'
  risk_baseline = '.risk_type == "risk_baseline"'
  risk_weak = '.risk_type == "risk_weak"'
  risk_attack = '.risk_type == "risk_attack"'

